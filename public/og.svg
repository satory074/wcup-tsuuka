<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f3d2e"/>
      <stop offset="100%" stop-color="#1f6f54"/>
    </linearGradient>
    <linearGradient id="adv" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- left text block -->
  <text x="72" y="150" font-family="Barlow Semi Condensed, Arial Narrow, sans-serif" font-size="34" font-weight="700" letter-spacing="6" fill="#9ae6b4">FIFA WORLD CUP</text>
  <text x="70" y="262" font-family="Hiragino Sans, Hiragino Kaku Gothic ProN, system-ui, sans-serif" font-size="96" font-weight="800" fill="#ffffff">通過タイムライン</text>
  <text x="74" y="328" font-family="Hiragino Sans, system-ui, sans-serif" font-size="30" font-weight="500" fill="#d7f0e4">グループステージの順位推移を、得点の瞬間まで可視化</text>

  <!-- year chips -->
  <g font-family="Spline Sans Mono, ui-monospace, monospace" font-size="30" font-weight="700">
    <rect x="72" y="372" width="118" height="52" rx="10" fill="#ffffff" fill-opacity="0.12"/>
    <text x="131" y="406" text-anchor="middle" fill="#ffffff">2018</text>
    <rect x="202" y="372" width="118" height="52" rx="10" fill="#ffffff" fill-opacity="0.12"/>
    <text x="261" y="406" text-anchor="middle" fill="#ffffff">2022</text>
    <rect x="332" y="372" width="118" height="52" rx="10" fill="#ffffff" fill-opacity="0.12"/>
    <text x="391" y="406" text-anchor="middle" fill="#ffffff">2026</text>
  </g>

  <text x="72" y="556" font-family="Spline Sans Mono, ui-monospace, monospace" font-size="26" font-weight="600" fill="#9ae6b4" letter-spacing="1">satory074.github.io/wcup-tsuuka</text>

  <!-- right bump-chart motif -->
  <g>
    <!-- advance band (ranks 1-2) -->
    <rect x="600" y="120" width="560" height="220" rx="14" fill="url(#adv)"/>
    <!-- gridlines -->
    <g stroke="#ffffff" stroke-opacity="0.12" stroke-width="2">
      <line x1="600" y1="160" x2="1160" y2="160"/>
      <line x1="600" y1="280" x2="1160" y2="280"/>
      <line x1="600" y1="400" x2="1160" y2="400"/>
      <line x1="600" y1="520" x2="1160" y2="520"/>
    </g>
    <g font-family="Spline Sans Mono, monospace" font-size="22" font-weight="700" fill="#bfe6d4" text-anchor="end">
      <text x="588" y="168">1</text>
      <text x="588" y="288">2</text>
      <text x="588" y="408">3</text>
      <text x="588" y="528">4</text>
    </g>

    <!-- 4 lines: cols x=645,765,885,1005,1125 ; ranks y=160,280,400,520 -->
    <!-- A cyan: 3,2,1,1,1 -->
    <polyline points="645,400 765,280 885,160 1005,160 1125,160" fill="none" stroke="#4cc9f0" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- B yellow: 1,1,2,3,2 -->
    <polyline points="645,160 765,160 885,280 1005,400 1125,280" fill="none" stroke="#ffd166" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- C mint: 4,3,3,2,3 -->
    <polyline points="645,520 765,400 885,400 1005,280 1125,400" fill="none" stroke="#06d6a0" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- D pink: 2,4,4,4,4 -->
    <polyline points="645,280 765,520 885,520 1005,520 1125,520" fill="none" stroke="#ef476f" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- end dots -->
    <circle cx="1125" cy="160" r="9" fill="#4cc9f0"/>
    <circle cx="1125" cy="280" r="9" fill="#ffd166"/>
    <circle cx="1125" cy="400" r="9" fill="#06d6a0"/>
    <circle cx="1125" cy="520" r="9" fill="#ef476f"/>
  </g>
</svg>
